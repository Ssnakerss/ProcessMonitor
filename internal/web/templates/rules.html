{{template "base" .}}

{{define "rules_title"}}Правила{{end}}
{{define "rules_content"}}
<h1>Правила приложений</h1>
<a href="/rules/new"><button>Добавить правило</button></a>
<table>
    <tr>
        <th>Название</th>
        <th>Файл</th>
        <th>Лимит (мин)</th>
        <th>Дни</th>
        <th>Статус</th>
        <th>Действия</th>
    </tr>
    {{range .Rules}}
    <tr>
        <td>{{.Name}}</td>
        <td class="muted">{{.ExecName}}</td>
        <td>{{.DailyLimitMinutes}}</td>
        <td>{{.Weekdays}}</td>
        <td>{{if .Enabled}}Вкл{{else}}Выкл{{end}}</td>
        <td>
            <a href="/rules/{{.ID}}/edit"><button>Изменить</button></a>
            <form method="POST" action="/rules/{{.ID}}/toggle" class="inline">
                <button type="submit">{{if .Enabled}}Выключить{{else}}Включить{{end}}</button>
            </form>
            <form method="POST" action="/rules/{{.ID}}/delete" class="inline" onsubmit="return confirm('Удалить правило?')">
                <button type="submit" class="danger">Удалить</button>
            </form>
        </td>
    </tr>
    {{end}}
</table>
{{end}}
